# Compilation profile: how a book compiles.
# The "how" only — style, layout, typography, bibliography, output. Document
# information (authors, title, keywords) lives in the visible +document.toml.

[document.structure]
toc_depth = 4      # Parts consume a level, so reach section subheadings
include_toc = true

[typography]
base_size = "12px"

[bibliography]
style = "nature"
references_file = "+references.toml"

[output]
formats = ["pdf", "html"]
